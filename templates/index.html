<!DOCTYPE html>
<html>
<head>
    <title>Flask App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">
        <h1>User Manager 🚀</h1>

        <form method="POST">
            <input type="text" name="name" placeholder="Enter your name" required>
            <button type="submit">Add User</button>
        </form>

        <h2>Users List</h2>
        <ul>
            {% for user in users %}
                <li>{{ user }}</li>
            {% endfor %}
        </ul>
    </div>

</body>
</html>
