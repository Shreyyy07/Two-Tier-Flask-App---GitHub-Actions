version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
    ports:
      - "3307:3306"

  flask:
    build: .
    container_name: flask-container
    ports:
      - "5001:5000"
    depends_on:
      - mysql